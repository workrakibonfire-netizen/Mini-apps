<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

    <!-- PROFILE HEADER -->

    <div class="card">

        <div style="
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
        ">

            <div id="profileAvatar"
                 style="
                    width:80px;
                    height:80px;
                    border-radius:50%;
                    background:#1f2937;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    font-size:32px;
                    margin-bottom:12px;
                 ">
                👤
            </div>

            <h2 id="profileName">
                Loading...
            </h2>

            <p class="small"
               id="profileUsername">
                @username
            </p>

            <p class="small"
               id="telegramId">
                ID: -
            </p>

        </div>

    </div>

    <br>

    <!-- BALANCE -->

    <div class="card">

        <h3>Balance</h3>

        <br>

        <div class="task-meta">
            <span>Main Balance</span>
            <span class="task-reward"
                  id="mainBalance">
                ৳0.00
            </span>
        </div>

        <br>

        <div class="task-meta">
            <span>Pending Balance</span>
            <span id="pendingBalance">
                ৳0.00
            </span>
        </div>

        <br>

        <div class="task-meta">
            <span>Deposit Balance</span>
            <span id="depositBalance">
                ৳0.00
            </span>
        </div>

    </div>

    <br>

    <!-- STATISTICS -->

    <div class="card">

        <h3>Statistics</h3>

        <br>

        <div class="task-meta">
            <span>Completed Tasks</span>
            <span id="completedTasks">
                0
            </span>
        </div>

        <br>

        <div class="task-meta">
            <span>Created Tasks</span>
            <span id="createdTasks">
                0
            </span>
        </div>

    </div>

    <br>

    <!-- TELEGRAM INFO -->

    <div class="card">

        <h3>Telegram Info</h3>

        <br>

        <div class="task-meta">

            <span>Telegram ID</span>

            <span id="telegramIdValue">
                -
            </span>

        </div>

        <br>

        <button
            class="btn btn-primary"
            onclick="copyTelegramId()">

            Copy Telegram ID

        </button>

    </div>

    <br><br><br><br><br><br>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <a href="index.html">
        <span class="nav-icon">🔥</span>
        <span class="nav-text">Earn</span>
    </a>

    <a href="myoffers.html">
        <span class="nav-icon">💼</span>
        <span class="nav-text">My Offers</span>
    </a>

    <a href="createoffer.html">
        <span class="nav-icon">➕</span>
        <span class="nav-text">Create</span>
    </a>

    <a href="mytasks.html">
        <span class="nav-icon">🗂</span>
        <span class="nav-text">My Tasks</span>
    </a>

    <a href="profile.html"
       class="active">
        <span class="nav-icon">👤</span>
        <span class="nav-text">Profile</span>
    </a>

</div>

<script src="js/core.js"></script>
<script src="js/profile.js"></script>

</body>
  </html>
