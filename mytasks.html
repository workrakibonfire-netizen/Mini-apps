<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Task Details</title>

<link rel="stylesheet"
      href="css/style.css?v=10">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

    <!-- BACK BUTTON -->

    <div class="card">

        <button
            class="btn"
            onclick="history.back()">

            ← Back

        </button>

    </div>

    <!-- TASK THUMBNAIL -->

    <div class="card">

        <img
            id="taskThumbnail"
            src="https://via.placeholder.com/800x400"
            style="
                width:100%;
                border-radius:14px;
            ">

    </div>

    <!-- TASK INFO -->

    <div class="card">

        <h2 id="taskTitle">

            Loading...

        </h2>

        <br>

        <div class="task-meta">

            <span>Reward</span>

            <span
                class="task-reward"
                id="taskReward">

                ৳0

            </span>

        </div>

        <br>

        <div class="task-meta">

            <span>Workers Left</span>

            <span
                id="taskWorkers">

                0

            </span>

        </div>

        <br>

        <div class="task-meta">

            <span>Duration</span>

            <span
                id="taskDuration">

                0 Days

            </span>

        </div>

    </div>

    <!-- INSTRUCTIONS -->

    <div class="card">

        <h3>
            Instructions
        </h3>

        <br>

        <div id="taskInstructions">

            Loading...

        </div>

    </div>

    <!-- PROOF REQUIREMENTS -->

    <div class="card">

        <h3>
            Proof Requirements
        </h3>

        <br>

        <div id="proofRequirements">

        </div>

    </div>

    <!-- ACTIONS -->

    <div class="card">

        <button
            class="btn btn-primary"
            id="openTaskBtn">

            Open Task

        </button>

        <br><br>

        <button
            class="btn btn-primary"
            id="submitProofBtn">

            Submit Proof

        </button>

    </div>

    <!-- PROOF FORM -->

    <div
        class="card"
        id="proofForm"
        style="display:none;">

        <h3>
            Submit Proof
        </h3>

        <br>

        <div id="proofFields">

        </div>

        <br>

        <button
            class="btn btn-primary"
            onclick="submitProof()">

            Submit

        </button>

    </div>

</div>

<script src="js/core.js?v=10"></script>
<script src="js/task.js?v=10"></script>

</body>
</html>
