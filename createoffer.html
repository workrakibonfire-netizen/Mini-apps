<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Task</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div>

            <h2>Create Task</h2>

            <p class="small">
                Create a task and hire workers
            </p>

        </div>

    </div>

    <!-- FORM -->

    <div class="card">

        <h3>Task Details</h3>

        <br>

        <label class="small">
            Task Type
        </label>

        <br><br>

        <select id="taskType" class="select">

            <option value="Telegram">
                Telegram
            </option>

            <option value="YouTube">
                YouTube
            </option>

            <option value="Facebook">
                Facebook
            </option>

            <option value="TikTok">
                TikTok
            </option>

            <option value="Website">
                Website Visit
            </option>

        </select>

        <br><br>

        <label class="small">
            Reward Per Worker
        </label>

        <br><br>

        <input
            type="number"
            id="reward"
            class="input"
            placeholder="Example: 5">

        <br><br>

        <label class="small">
            Total Workers
        </label>

        <br><br>

        <input
            type="number"
            id="workers"
            class="input"
            placeholder="Minimum 10">

        <br><br>

        <label class="small">
            Duration (Days)
        </label>

        <br><br>

        <input
            type="number"
            id="duration"
            class="input"
            placeholder="Maximum 7">

        <br><br>

        <label class="small">
            Task Link
        </label>

        <br><br>

        <input
            type="url"
            id="taskLink"
            class="input"
            placeholder="https://">

        <br><br>

        <label class="small">
            Instructions
        </label>

        <br><br>

        <textarea
            id="instructions"
            class="textarea"
            placeholder="Explain task step by step..."></textarea>

        <br><br>

        <label class="small">
            Example Image / Thumbnail
        </label>

        <br><br>

        <input
            type="file"
            id="instructionImage"
            accept="image/*"
            class="input">

        <br><br>

        <img
            id="imagePreview"
            style="
                display:none;
                width:100%;
                border-radius:16px;
                border:1px solid var(--border-color);
            ">

        <br><br>

        <label class="small">
            Proof Requirements
        </label>

        <br><br>

        <div id="proofContainer">

            <div class="proof-item">

                <select
                    class="select proof-type">

                    <option value="text">
                        Text Proof
                    </option>

                    <option value="screenshot">
                        Screenshot Proof
                    </option>

                </select>

                <br><br>

                <input
                    type="text"
                    class="input proof-label"
                    placeholder="Example: Telegram Username">

            </div>

        </div>

        <br>

        <button
            type="button"
            id="addProofBtn"
            class="btn btn-secondary">

            + Add Proof Requirement

        </button>

    </div>

    <!-- COST SUMMARY -->

    <div class="card">

        <h3>
            Cost Summary
        </h3>

        <br>

        <div class="task-meta">

            <span>
                Reward
            </span>

            <span id="rewardPreview">
                ৳0
            </span>

        </div>

        <br>

        <div class="task-meta">

            <span>
                Workers
            </span>

            <span id="workerPreview">
                0
            </span>

        </div>

        <br>

        <div class="task-meta">

            <span>
                Total Cost
            </span>

            <span
                id="totalCost"
                class="task-reward">

                ৳0

            </span>

        </div>

    </div>

    <!-- BUTTON -->

    <button
        id="createTaskBtn"
        class="btn btn-primary">

        Create Task

    </button>

    <br><br><br><br><br><br>

</div>

</div>

</body>
