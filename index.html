<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Task Marketplace</title><link rel="stylesheet"
      href="css/style.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><div class="container"><!-- HEADER -->

<div class="header">

    <div class="logo">
        🚀 TaskHub
    </div>

    <div>
        <span id="username">
            Loading...
        </span>
    </div>

</div>


<!-- BALANCE CARD -->

<div class="balance-card">

    <div class="balance-label">
        Available Balance
    </div>

    <div class="balance-amount"
         id="main-balance">
        ৳0.00
    </div>

</div>


<!-- SEARCH -->

<div class="card">

    <input
        type="text"
        class="input"
        id="searchInput"
        placeholder="Search Tasks">

</div>


<!-- CATEGORIES -->

<div class="card">

    <h3>
        Categories
    </h3>

    <br>

    <div class="categories">

        <button class="cat-btn active">
            All
        </button>

        <button class="cat-btn">
            Telegram
        </button>

        <button class="cat-btn">
            YouTube
        </button>

        <button class="cat-btn">
            Facebook
        </button>

        <button class="cat-btn">
            TikTok
        </button>

        <button class="cat-btn">
            Website
        </button>

    </div>

</div>


<!-- TASK LIST -->

<div id="taskContainer">

    <!-- Dynamic Tasks -->

</div>

</div><!-- BOTTOM NAV --><div class="bottom-nav"><a href="index.html"
   class="active">
    Home
</a>

<a href="myoffers.html">
    My Offers
</a>

<a href="createoffer.html">
    Create
</a>

<a href="mytasks.html">
    My Tasks
</a>

<a href="profile.html">
    Profile
</a>

</div><script src="js/core.js"></script><script src="js/offers.js"></script></body>
