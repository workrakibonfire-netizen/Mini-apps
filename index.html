</div>


<!-- BALANCE CARD -->

    </div>

        class="input"
        id="searchInput"

    <h3>
        Categories

    <div class="categories">

        <button class="cat-btn active">

        </button>

        <button class="cat-btn">

        <button class="cat-btn">
            YouTube
        </button>

        <button class="cat-btn">

        <button class="cat-btn">
            TikTok
        </button>

        <button class="cat-btn">

<div id="taskContainer">
