<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EarnHub</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
            💰 EarnHub
        </div>

        <div id="username">
            Loading...
        </div>

    </div>

    <!-- BALANCE -->

    <div class="balance-card">

        <div class="balance-label">
            Available Balance
        </div>

        <div class="balance-amount"
             id="main-balance">

            ৳0.00

        </div>

    </div>

    <!-- QUICK STATS -->

    <div class="stats-grid">

        <div class="stat-card">

            <div class="stat-value"
                 id="availableTasks">

                0

            </div>

            <div class="stat-label">
                Tasks
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-value"
                 id="totalEarned">

                ৳0

            </div>

            <div class="stat-label">
                Earned
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-value"
                 id="pendingReviews">

                0

            </div>

            <div class="stat-label">
                Pending
            </div>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="card">

        <input
            type="text"
            class="input"
            id="searchInput"
            placeholder="Search Tasks...">

    </div>

    <!-- CATEGORY FILTER -->

    <div class="card">

        <div class="categories">

            <button class="cat-btn active"
                    data-category="all">
                All
            </button>

            <button class="cat-btn"
                    data-category="Telegram">
                Telegram
            </button>

            <button class="cat-btn"
                    data-category="YouTube">
                YouTube
            </button>

            <button class="cat-btn"
                    data-category="Facebook">
                Facebook
            </button>

            <button class="cat-btn"
                    data-category="TikTok">
                TikTok
            </button>

            <button class="cat-btn"
                    data-category="Website">
                Website
            </button>

        </div>

    </div>

    <!-- TITLE -->

    <h3 style="margin-bottom:15px;">
        🔥 Available Tasks
    </h3>

    <!-- TASKS -->

    <div id="taskContainer">

    </div>

    <br><br><br><br><br><br>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <a href="index.html"
       class="active">

        <span class="nav-icon">🔥</span>
        <span class="nav-text">Earn</span>

    </a>

    <a href="myoffers.html">

        <span class="nav-icon">💼</span>
        <span class="nav-text">My Offers</span>

    </a>

    <a href="createoffer.html">

        <span class="nav-icon">➕</span>
        <span class="nav-text">Create</span>

    </a>

    <a href="mytasks.html">

        <span class="nav-icon">🗂</span>
        <span class="nav-text">My Tasks</span>

    </a>

    <a href="profile.html">

        <span class="nav-icon">👤</span>
        <span class="nav-text">Profile</span>

    </a>

</div>

<script src="js/core.js"></script>
<script src="js/offers.js"></script>

</body>
          </html>
