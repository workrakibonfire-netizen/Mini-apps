<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Marketplace</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Header -->
    <header class="header">

        <div class="balance-box">
            <span class="balance-label">Balance</span>
            <h2>৳ 0.00</h2>
        </div>

        <div class="profile-btn">
            <img src="https://i.ibb.co/2n7xQqV/user.png" alt="profile">
        </div>

    </header>

    <!-- Filter -->

    <section class="filters">

        <select>
            <option>All Types</option>
            <option>Telegram</option>
            <option>YouTube</option>
            <option>Facebook</option>
            <option>TikTok</option>
            <option>App Install</option>
        </select>

        <select>
            <option>All Tasks</option>
        </select>

    </section>

    <!-- Task List -->

    <section class="task-list">

        <div class="task-card">

            <div class="task-left">

                <h3>Join Telegram Channel</h3>

                <p class="participants">
                    3719 Participants
                </p>

                <p class="reward">
                    Reward: ৳5
                </p>

                <p class="expire">
                    Expires in 2 Days
                </p>

            </div>

            <div class="task-right">

                <div class="price">
                    ৳5
                </div>

            </div>

        </div>

        <div class="task-card">

            <div class="task-left">

                <h3>YouTube Subscribe</h3>

                <p class="participants">
                    2911 Participants
                </p>

                <p class="reward">
                    Reward: ৳3
                </p>

                <p class="expire">
                    Expires in 1 Day
                </p>

            </div>

            <div class="task-right">

                <div class="price">
                    ৳3
                </div>

            </div>

        </div>

    </section>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <button class="active">
        Offers
    </button>

    <button>
        My Offers
    </button>

    <button>
        Create Offer
    </button>

    <button>
        My Tasks
    </button>

</nav>

<script src="script.js"></script>

</body>
</html>
